server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # The service worker file must never be cached, so updates (and the new
    # CACHE version inside it) reach clients immediately.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # The app shell is small and changes with every release; serve it
    # network-first by disabling caching, the service worker handles
    # offline use from its own cache.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Manifest and icons can be cached briefly.
    location ~* \.(?:png|ico|webmanifest|json)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Single-page app fallback (all routing is via #/ hash, but this keeps
    # any direct path requests from 404ing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic health check endpoint for container orchestration.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
