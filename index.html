<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0A6B3B" />
<title>Ghana NDC Executive Registry</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
:root{
  --green:#0A6B3B; --green-dark:#064d2a; --green-soft:#e7f1ec;
  --red:#CE1126; --red-soft:#fbe7e9; --gold:#F2B705;
  --ink:#16241c; --muted:#5f6f64; --bg:#f3f6f3; --surface:#ffffff;
  --line:#e1e8e2; --line-strong:#cdd8cf; --shadow:0 1px 2px rgba(16,40,28,.06),0 8px 24px rgba(16,40,28,.06);
  --radius:14px; --radius-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;font-size:15px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--green);text-decoration:none}
h1,h2,h3,h4{margin:0;line-height:1.2;letter-spacing:-.01em}
.hidden{display:none!important}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

/* ---------- App frame ---------- */
#app{max-width:760px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:var(--green);color:#fff;padding:env(safe-area-inset-top) 0 0}
.topbar-in{display:flex;align-items:center;gap:11px;padding:13px 16px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{flex:0 0 auto;width:36px;height:36px;border-radius:10px;background:#fff;display:grid;place-items:center;box-shadow:0 1px 3px rgba(0,0,0,.18)}
.brand-mark img{width:26px;height:26px;object-fit:contain;display:block}
.umbrella{flex:0 0 auto}
.brand-txt{min-width:0}
.brand-txt .t1{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.78;font-weight:700}
.brand-txt .t2{font-size:15.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-dot{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,.16);padding:5px 9px;border-radius:999px}
.sync-dot i{width:7px;height:7px;border-radius:50%;background:var(--gold);display:inline-block}
.sync-dot.online i{background:#7BE29B}
.iconbtn{background:rgba(255,255,255,.14);border:0;color:#fff;width:34px;height:34px;border-radius:9px;font-size:15px;display:grid;place-items:center}
.iconbtn:hover{background:rgba(255,255,255,.24)}

/* ---------- Tab nav ---------- */
.tabs{display:flex;overflow-x:auto;background:var(--green-dark);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs a{color:rgba(255,255,255,.74);padding:11px 15px;font-size:13px;font-weight:600;white-space:nowrap;border-bottom:3px solid transparent}
.tabs a.active{color:#fff;border-bottom-color:var(--gold)}

.content{flex:1;padding:16px 16px 90px}

/* ---------- Cards & layout ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:16px}
.section-head{display:flex;align-items:center;gap:10px;margin:4px 2px 12px}
.section-head h2{font-size:19px;font-weight:800}
.section-head .sub{color:var(--muted);font-size:13px}
.spacer{flex:1}
.row{display:flex;gap:10px;align-items:center}
.wrap{flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-stat{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
@media(min-width:560px){.grid-stat{grid-template-columns:repeat(4,1fr)}}
.muted{color:var(--muted)}
.small{font-size:13px}
.tiny{font-size:11.5px}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);padding:10px 14px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;transition:filter .12s,background .12s}
.btn:hover{background:#f7faf8}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{filter:brightness(1.06)}
.btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.btn.ghost{background:transparent;border-color:transparent;color:var(--green)}
.btn.sm{padding:7px 11px;font-size:13px}
.btn.block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---------- Stat tiles ---------- */
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.stat .n{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1}
.stat .l{font-size:12px;color:var(--muted);font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:.04em}
.stat .ico{position:absolute;right:10px;top:10px;opacity:.13}
.stat.g{border-top:3px solid var(--green)}
.stat.r{border-top:3px solid var(--red)}
.stat.y{border-top:3px solid var(--gold)}
.stat.k{border-top:3px solid var(--ink)}

/* ---------- List items ---------- */
.list{display:flex;flex-direction:column;gap:9px}
.item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:11px 13px;box-shadow:var(--shadow);transition:border-color .12s}
.item:hover{border-color:var(--line-strong)}
.item .av{flex:0 0 auto;width:46px;height:46px;border-radius:11px;object-fit:cover;background:var(--green-soft);display:grid;place-items:center;color:var(--green);font-weight:800;font-size:16px;overflow:hidden}
.item .av img{width:100%;height:100%;object-fit:cover}
.item .body{min-width:0;flex:1}
.item .body .nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .body .mt{color:var(--muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .chev{color:var(--line-strong);font-size:20px}
.item.org{cursor:pointer}
.org .icoo{flex:0 0 auto;width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:18px}
.org .icoo.w{background:var(--green-soft);color:var(--green)}
.org .icoo.b{background:#eef0fa;color:#4753b8}
.org .icoo.u{background:#fdf1e3;color:#b5751a}

/* ---------- Badges & pills ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--green-soft);color:var(--green-dark)}
.badge.r{background:var(--red-soft);color:var(--red)}
.badge.k{background:#eceeec;color:var(--ink)}
.badge.y{background:#fdf3d4;color:#8a6400}
.pip-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.pip{width:9px;height:9px;border-radius:3px;background:var(--line-strong)}
.pip.on{background:var(--green)}
.reg{font-variant-numeric:tabular-nums;font-weight:700;color:var(--green-dark);letter-spacing:.02em}
.reg-tag{display:inline-block;font-variant-numeric:tabular-nums;font-weight:800;font-size:12px;letter-spacing:.06em;color:var(--green-dark);background:var(--green-soft);border:1px solid var(--line-strong);padding:2px 9px;border-radius:7px;margin-bottom:7px}

/* ---------- Forms ---------- */
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:5px}
.field label .req{color:var(--red)}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:var(--radius-sm);background:#fff;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--green);outline-offset:1px;border-color:var(--green)}
.field textarea{min-height:74px;resize:vertical}
.field .err{color:var(--red);font-size:12px;margin-top:4px;font-weight:600}
.field.bad input,.field.bad select,.field.bad textarea{border-color:var(--red)}

/* ---------- Photo control ---------- */
.photo-box{display:flex;gap:14px;align-items:center}
.photo-prev{width:104px;height:128px;border-radius:12px;border:2px dashed var(--line-strong);background:var(--green-soft);display:grid;place-items:center;overflow:hidden;flex:0 0 auto;color:var(--muted);text-align:center;font-size:12px;padding:8px}
.photo-prev img{width:100%;height:100%;object-fit:cover}
.photo-actions{display:flex;flex-direction:column;gap:8px;flex:1}

/* ---------- Search bar ---------- */
.searchbar{display:flex;gap:8px;margin-bottom:13px}
.searchbar input{flex:1;padding:11px 13px;border:1px solid var(--line-strong);border-radius:var(--radius-sm);background:#fff}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}
.filters select{padding:8px 10px;border:1px solid var(--line-strong);border-radius:9px;background:#fff;font-size:13px;font-weight:600}

/* ---------- Bars (gender / coverage) ---------- */
.bar{height:12px;border-radius:999px;background:var(--line);overflow:hidden;display:flex}
.bar i{display:block;height:100%}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12.5px;font-weight:600}
.legend span{display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
.legend span b{color:var(--ink)}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}

/* ---------- Breadcrumb ---------- */
.crumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-bottom:12px;font-weight:600}
.crumb a{color:var(--muted)}
.crumb a:hover{color:var(--green)}
.crumb .sep{opacity:.5}

/* ---------- Profile ---------- */
.profile-top{display:flex;gap:16px;align-items:flex-start}
.profile-photo{width:118px;height:144px;border-radius:14px;object-fit:cover;background:var(--green-soft);flex:0 0 auto;box-shadow:var(--shadow)}
.kv{display:grid;grid-template-columns:128px 1fr;gap:8px 12px;font-size:14px;margin-top:6px}
.kv dt{color:var(--muted);font-weight:600}
.kv dd{margin:0;font-weight:600;word-break:break-word}

/* ---------- Empty / toast / modal ---------- */
.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty .e-ico{font-size:40px;opacity:.4;margin-bottom:8px}
.empty h3{font-size:16px;color:var(--ink);margin-bottom:6px}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-weight:600;font-size:14px;opacity:0;transition:.25s;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
.modal-bg{position:fixed;inset:0;background:rgba(16,36,24,.5);display:grid;place-items:center;z-index:50;padding:18px}
.modal{background:#fff;border-radius:16px;max-width:420px;width:100%;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:17px;margin-bottom:8px}
.modal p{color:var(--muted);font-size:14px;margin:0 0 16px}
.modal .acts{display:flex;gap:10px;justify-content:flex-end}

/* ---------- Login ---------- */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;background:linear-gradient(160deg,var(--green) 0%,var(--green-dark) 70%);}
.login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.28)}
.login-brand{text-align:center;margin-bottom:22px}
.login-logo{width:130px;height:auto;display:block;margin:0 auto 14px}
.login-brand .t1{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700}
.login-brand .t2{font-size:21px;font-weight:800;color:var(--green-dark);margin-top:3px}
.login-brand .t3{font-size:12px;font-style:italic;color:var(--muted);margin-top:6px}
.login-note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.5}
.fab{position:fixed;right:max(16px,calc(50% - 380px + 16px));bottom:22px;z-index:25;background:var(--red);color:#fff;border:0;height:54px;padding:0 20px;border-radius:999px;font-weight:800;font-size:15px;box-shadow:0 10px 26px rgba(206,17,38,.4);display:inline-flex;align-items:center;gap:8px}

/* ---------- Photo album ---------- */
.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
.album-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;cursor:pointer}
.album-card:hover{border-color:var(--line-strong)}
.album-photo{aspect-ratio:3/4;background:var(--green-soft);display:grid;place-items:center;overflow:hidden}
.album-photo img{width:100%;height:100%;object-fit:cover;display:block}
.album-photo .ph-init{font-size:32px;font-weight:800;color:var(--green)}
.album-meta{padding:8px 10px 10px}
.album-meta .reg{font-size:10.5px;font-weight:800;color:var(--green-dark);letter-spacing:.05em;font-variant-numeric:tabular-nums}
.album-meta .nm{font-weight:700;font-size:13.5px;line-height:1.2;margin:2px 0}
.album-meta .pos{font-size:12px;color:var(--ink)}
.album-meta .loc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.3}
.album-ward-head{display:flex;align-items:baseline;gap:8px;margin:18px 2px 11px;font-weight:800;font-size:15px;border-bottom:2px solid var(--green-soft);padding-bottom:6px}
.album-ward-head .ct{font-size:12px;font-weight:700;color:var(--muted)}
.print-only{display:none}
.album-print-head{text-align:center}
.album-print-head img{width:54px;height:auto;margin:0 auto 6px;display:block}
.album-print-head .pt{font-size:18px;font-weight:800;color:var(--green-dark)}
.album-print-head .ps{font-size:12px;color:var(--muted);margin-top:2px}
.album-print-head .pm{font-size:11px;font-style:italic;color:var(--muted);margin-top:4px;letter-spacing:.04em}
.album-print-foot{text-align:center;font-size:13px;font-weight:800;color:var(--green-dark);margin-top:16px;padding-top:8px;border-top:1px solid #ddd}

@media print{
  @page{margin:12mm}
  html,body,#app{background:#fff !important}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .topbar,.tabs,.fab,.no-print{display:none !important}
  .content{padding:0 !important}
  #app{max-width:none}
  .print-only{display:block !important}
  .album-grid{grid-template-columns:repeat(3,1fr) !important;gap:9px !important}
  .album-card{break-inside:avoid;page-break-inside:avoid;box-shadow:none !important;border:1px solid #bbb !important;cursor:auto}
  .album-ward-head{break-after:avoid;page-break-after:avoid}
  .album-print-foot{break-inside:avoid;page-break-inside:avoid}
  .card{box-shadow:none !important}
}
</style>
</head>
<body>
<div id="app"><div class="login-wrap"><div class="muted">Loading…</div></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Ghana NDC Party Executive Registry - National (16 Regions, 276 Constituencies)
   Single-file offline-first PWA.
   Data layer abstracts over window.storage (in-app preview) and
   IndexedDB (when deployed), so the UI never changes if you later
   swap in Supabase behind the same async key/value interface.
   ============================================================ */

/* ---------------- Storage layer (KV) ---------------- */
/* ============================================================
   SUPABASE CLIENT — replaces local IndexedDB Store
   All registry data (users, executives, wards, branches, units,
   sequences, audit) lives in a single shared Supabase project so
   every device reads and writes the same data in real time.
   ============================================================ */
const SUPABASE_URL = 'https://fiuquuftdaomqazuohsh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpdXF1dWZ0ZGFvbXFhenVvaHNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjU1MzUsImV4cCI6MjA5Njk0MTUzNX0.Pm5nMXQq1Nc3zZovTe_FzMGvll-8r9P28pse1Fnzgjk';

async function sbFetch(path, opts={}){
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = Object.assign({
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || '',
  }, opts.headers||{});
  delete headers[''];
  const res = await fetch(url, Object.assign({cache:'no-store'}, opts, {headers}));
  if(!res.ok){
    const txt = await res.text().catch(()=>'');
    throw new Error('Supabase '+res.status+': '+txt.slice(0,120));
  }
  const ct = res.headers.get('content-type')||'';
  if(ct.includes('json') && res.status!==204){ try{ return await res.json(); }catch{ return null; } }
  return null;
}

// Thin table-level helpers
const SB = {
  // SELECT — returns array
  select: (table, qs='')=> sbFetch(table+'?'+qs, {method:'GET', prefer:''}),
  // INSERT with upsert
  upsert: (table, body)=> sbFetch(table, {method:'POST', body:JSON.stringify(body), prefer:'resolution=merge-duplicates,return=representation'}),
  // UPDATE by eq filter
  update: (table, filter, body)=> sbFetch(table+'?'+filter, {method:'PATCH', body:JSON.stringify(body), prefer:'return=representation'}),
  // DELETE by eq filter
  delete: (table, filter)=> sbFetch(table+'?'+filter, {method:'DELETE', prefer:''}),
};

// ---- camelCase <-> snake_case mappers ----
function execToRow(e){
  return {
    id: e.id, level: e.level,
    region_id: e.regionId||null,
    constituency_id: e.constituencyId||null,
    ward_id: e.wardId||null,
    branch_id: e.branchId||null,
    unit_id: e.unitId||null,
    full_name: e.fullName, member_id: e.memberId||null, position: e.position,
    gender: e.gender||null, phone: e.phone||null, email: e.email||null,
    dob: e.dob||null, occupation: e.occupation||null,
    address: e.address||null, background: e.background||null,
    photo: e.photo||null, reg_no: e.regNo||null,
    status: e.status||'active',
    created_at: e.createdAt||new Date().toISOString(),
    updated_at: e.updatedAt||new Date().toISOString(),
    created_by: e.createdBy||null,
  };
}
function rowToExec(r){
  return {
    id:r.id, level:r.level, regionId:r.region_id, constituencyId:r.constituency_id,
    wardId:r.ward_id, branchId:r.branch_id, unitId:r.unit_id,
    fullName:r.full_name, memberId:r.member_id, position:r.position, gender:r.gender, phone:r.phone,
    email:r.email, dob:r.dob, occupation:r.occupation, address:r.address,
    background:r.background, photo:r.photo, regNo:r.reg_no, status:r.status,
    createdAt:r.created_at, updatedAt:r.updated_at, createdBy:r.created_by,
  };
}
function wardToRow(w){
  return {id:w.id, name:w.name, constituency_id:w.constituencyId, code:w.code||null, created_at:w.createdAt||new Date().toISOString(), updated_at:w.updatedAt||new Date().toISOString(), created_by:w.createdBy||null};
}
function rowToWard(r){ return {id:r.id, name:r.name, constituencyId:r.constituency_id, code:r.code, type:'ward', createdAt:r.created_at, updatedAt:r.updated_at, createdBy:r.created_by}; }
function branchToRow(b){ return {id:b.id, name:b.name, ward_id:b.wardId, created_at:b.createdAt||new Date().toISOString(), updated_at:b.updatedAt||new Date().toISOString(), created_by:b.createdBy||null}; }
function rowToBranch(r){ return {id:r.id, name:r.name, wardId:r.ward_id, type:'branch', createdAt:r.created_at, updatedAt:r.updated_at, createdBy:r.created_by}; }
function unitToRow(u){ return {id:u.id, name:u.name, branch_id:u.branchId, created_at:u.createdAt||new Date().toISOString(), updated_at:u.updatedAt||new Date().toISOString(), created_by:u.createdBy||null}; }
function rowToUnit(r){ return {id:r.id, name:r.name, branchId:r.branch_id, type:'unit', createdAt:r.created_at, updatedAt:r.updated_at, createdBy:r.created_by}; }
function userToRow(u){
  return {id:u.id||u.username, username:u.username, password:u.password, full_name:u.fullName||u.username, role:u.role, scope_constituency_id:u.scopeConstituencyId||null, scope_constituency_name:u.scopeConstituencyName||null, must_change_password:u.mustChangePassword||false, suspended:u.suspended||false, created_by:u.createdBy||null, updated_at:new Date().toISOString()};
}
function rowToUser(r){
  return {id:r.id, username:r.username, password:r.password, fullName:r.full_name, role:r.role, scopeConstituencyId:r.scope_constituency_id, scopeConstituencyName:r.scope_constituency_name, mustChangePassword:r.must_change_password||false, suspended:r.suspended||false, createdBy:r.created_by};
}

// ---- Store shim — same API as before, backed by Supabase ----
const Store = {
  // Kept for legacy callers that pass 'meta:session' etc. — stored in sessionStorage only
  _local: {
    get: k=> { try{ const v=sessionStorage.getItem('ndc:'+k); return v? JSON.parse(v):null; }catch{ return null; } },
    set: (k,v)=> { try{ sessionStorage.setItem('ndc:'+k, JSON.stringify(v)); }catch{} },
    del: k=> { try{ sessionStorage.removeItem('ndc:'+k); }catch{} },
  },
  get backend(){ return 'Supabase'; },

    }
  }catch(e){ console.warn('Bootstrap admin seed error:',e.message); }

  const sess = Store._local.get('meta:session');
  if(sess){
    try{
      const rows = await SB.select('ndc_users','username=eq.'+encodeURIComponent(sess)+'&limit=1');

/* ---------------- Registration numbers (atomic, shared across all devices) ---------------- */
function formatReg(prefix, n){ return prefix+'-'+String(n).padStart(4,'0'); }
async function nextRegNo(prefix){
  // Atomic increment using Supabase RPC-style upsert + re-read.
  // We upsert a row with current+1, then read back the resulting value.
  // Uses a retry loop in case of concurrent writers on the same prefix.
  for(let attempt=0; attempt<5; attempt++){
    try{
      // Read current
      const rows = await SB.select('ndc_sequences','prefix=eq.'+encodeURIComponent(prefix)+'&limit=1');
      const current = (rows && rows[0]) ? rows[0].current : 0;
      const next = current + 1;
      if(rows && rows[0]){
        // Optimistic update: only succeeds if current still matches
        await SB.update('ndc_sequences','prefix=eq.'+encodeURIComponent(prefix), {current:next});
      } else {
        await SB.upsert('ndc_sequences', {prefix, current:next});
      }
      return formatReg(prefix, next);
    }catch(e){
      if(attempt===4) throw e;
      await new Promise(r=>setTimeout(r, 50+Math.random()*100));
    }
  }
}

}

// Resolve the constituency id for any executive or org node (null for region-level).
async function constituencyIdOf(rec){
  if(!rec) return null;
  if(rec.level==='region') return null;
  if(rec.level==='constituency' || rec.type==='constituency') return rec.constituencyId || rec.id;
  if(rec.level==='ward' || rec.type==='ward'){ const w = rec.constituencyId!==undefined ? rec : await Data.get('ward:'+(rec.wardId||rec.id)); return w?w.constituencyId:null; }
  if(rec.level==='branch' || rec.type==='branch'){ const b = rec.wardId!==undefined && rec.type==='branch' ? rec : await Data.get('branch:'+(rec.branchId||rec.id)); const w=b?await Data.get('ward:'+b.wardId):null; return w?w.constituencyId:null; }
  // unit
  const u = (rec.branchId!==undefined && rec.type==='unit') ? rec : await Data.get('unit:'+(rec.unitId||rec.id));
  const b = u?await Data.get('branch:'+u.branchId):null; const w=b?await Data.get('ward:'+b.wardId):null; return w?w.constituencyId:null;
}

/* ---------------- Photo capture + compression ---------------- */
function compressImage(file, maxDim=620, quality=0.72){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ URL.revokeObjectURL(url);
      let w=img.width,h=img.height;
      if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=rej; img.src=url;
  });
}

function parseHash(){
  const h = location.hash.replace(/^#/,'')||'/dashboard';
  const [path,qs] = h.split('?');
  const parts = path.split('/').filter(Boolean);
  const q = Object.fromEntries(new URLSearchParams(qs||''));
  return {parts,q};
}
let _rendering=false, _pending=false;
async function render(){
  if(_rendering){ _pending=true; return; }
  _rendering=true;
  try{ await _render(); }
  finally{ _rendering=false; if(_pending){ _pending=false; render(); } }
}
async function _render(){
  await ensureReady;
  const app=$('#app');
  if(!State.session){ app.innerHTML = viewLogin(); wireLogin(); return; }
  if(State.session.mustChangePassword){ app.innerHTML = viewForcePasswordChange(); wireForcePasswordChange(); return; }
  const {parts,q}=parseHash();
  const route = parts[0]||'dashboard';
  // shell
  app.innerHTML = shell(route);
  const c = $('#content');
  try{
    if(route==='dashboard'){ c.innerHTML = await viewDashboard(); }
    else if(route==='constituencies'){ c.innerHTML = await viewConstituencies(); }
    else if(route==='region'){ c.innerHTML = await viewRegionDetail(parts[1]); }
    else if(route==='constituency'){ c.innerHTML = await viewConstituencyDetail(parts[1]); }
    else if(route==='regional'){ c.innerHTML = await viewRegional(parts[1]); }

    else if(route==='ward'){ c.innerHTML = await viewOrgDetail('ward', parts[1]); }
    else if(route==='branch'){ c.innerHTML = await viewOrgDetail('branch', parts[1]); }
    else if(route==='unit'){ c.innerHTML = await viewOrgDetail('unit', parts[1]); }
    else if(route==='exec'){
      if(parts[1]==='new'){ c.innerHTML = await viewExecForm(null,q); wireExecForm(); }

    }
    else if(route==='search'){ c.innerHTML = await viewSearch(q); wireSearch(); }
    else if(route==='reports'){ c.innerHTML = await viewReports(); }
    else if(route==='album'){ c.innerHTML = await viewAlbum(q); wireAlbum(); }
    else if(route==='data'){ c.innerHTML = await viewData(); wireData(); }
    else if(route==='admin'){ c.innerHTML = await viewAdmin(); wireAdmin(); }
    else if(route==='account'){ c.innerHTML = await viewAccount(); wireAccount(); }
    else if(route==='audit'){ c.innerHTML = await viewAudit(); }
    else { c.innerHTML = await viewDashboard(); }
  }catch(e){ console.error(e); c.innerHTML = `<div class="empty"><div class="e-ico">⚠️</div><h3>Something went wrong</h3><p class="muted">${esc(e.message)}</p></div>`; }
  wireGlobal();
  updateSync();
}

function tab(route,active,href,label){ return `<a href="${href}" class="${route===active?'active':''}">${label}</a>`; }
function shell(active){
  const role = State.session.role;
  const isAdmin = role==='national_admin' || role==='constituency_admin';
  const scopedCon = userConId();
  // brand context line
  let ctx = esc(NATION_NAME);
  if(scopedCon){ ctx = esc(State.session.scopeConstituencyName || scopedCon); }
  // registry tab target
  const regHref = isNational()? '#/constituencies' : ('#/constituency/'+ (scopedCon||''));
  const regActive = ['constituencies','region','constituency','regional','ward','branch','unit'].includes(active)?'constituencies':active;
  return `
  <div class="topbar">
    <div class="topbar-in">
      <div class="brand" title="${esc(PARTY_MOTTO)}"><span class="brand-mark"><img src="${LOGO_MARK}" alt="NDC umbrella"></span>
        <div class="brand-txt">
          <div class="t1">NDC • ${ctx}</div>
          <div class="t2">Executive Registry</div>
        </div>
      </div>
      <div class="right">
        <span class="sync-dot" id="syncDot"><i></i><span id="syncTxt">Local</span></span>
        <button class="iconbtn" data-act="account" title="My account">👤</button>
        <button class="iconbtn" data-act="logout" title="Sign out">⏻</button>
      </div>
    </div>
    <nav class="tabs">
      ${tab('dashboard',active,'#/dashboard','Dashboard')}
      ${tab('constituencies',regActive,regHref,'Registry')}
      ${tab('search',active,'#/search','Search')}
      ${tab('reports',active,'#/reports','Reports')}
      ${tab('album',active,'#/album','Album')}
      ${tab('data',active,'#/data','Data')}
      ${tab('audit',active,'#/audit','Activity')}
      ${isAdmin?tab('admin',active,'#/admin','Admin'):''}
    </nav>
  </div>
  <div class="content" id="content"></div>`;
}

/* ============================================================
   LOGIN
   ============================================================ */
function viewLogin(){
  return `<div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <img class="login-logo" src="${LOGO_FULL}" alt="NDC logo" />
        <div class="t1">${esc(NATION_NAME)}</div>
        <div class="t2">Party Executive Registry</div>
        <div class="t3">${esc(PARTY_MOTTO)}</div>
      </div>
      <div class="field"><label>Username</label><input id="lu" autocomplete="username" placeholder="Username" /></div>
      <div class="field"><label>Password</label><input id="lp" type="password" autocomplete="current-password" placeholder="••••••••" /></div>
      <button class="btn primary block" data-act="dologin">Sign in</button>
    </div>
  </div>`;
}
function wireLogin(){
  const go = async ()=>{ const u=$('#lu').value.trim(), p=$('#lp').value; if(!u||!p){ toast('Enter username and password',true); return; } const status=await login(u,p); if(status==='ok'){ location.hash='#/dashboard'; render(); } else if(status==='suspended'){ toast('This account has been suspended. Contact your administrator.',true); } else if(status==='invalid'){ toast('Wrong username or password',true); } };
  $('[data-act=dologin]').addEventListener('click',go);
  $('#lp').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
  $('#lu').focus();
}

/* ============================================================
   FORCED PASSWORD CHANGE (shown once, e.g. first login on a
   fresh install, or any account still on the published default
   password)
   ============================================================ */
function viewForcePasswordChange(){
  return `<div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <img class="login-logo" src="${LOGO_FULL}" alt="NDC logo" />
        <div class="t1">Set a new password</div>
        <div class="t2">For security, choose a new password for @${esc(State.session.username)} before continuing.</div>
      </div>
      <div class="field"><label>New password</label><input id="fpNew" type="password" autocomplete="new-password" placeholder="At least 4 characters" /></div>
      <div class="field"><label>Confirm new password</label><input id="fpConfirm" type="password" autocomplete="new-password" placeholder="Repeat new password" /></div>
      <button class="btn primary block" data-act="setPassword">Set password and continue</button>
    </div>
  </div>`;
}
function wireForcePasswordChange(){
  const go = async ()=>{
    const p1=$('#fpNew').value.trim(), p2=$('#fpConfirm').value.trim();
    if(p1.length<4){ toast('Use at least 4 characters',true); return; }
    if(p1!==p2){ toast('Passwords do not match',true); return; }
    try{
      await SB.update('ndc_users','username=eq.'+encodeURIComponent(State.session.username),{password:p1,must_change_password:false,updated_at:nowISO()});
      State.session.password=p1; State.session.mustChangePassword=false;
      await audit('UPDATE','user',State.session.username,'Set initial password');
      toast('Password set');
      location.hash='#/dashboard'; render();
    }catch(e){ toast('Could not save password: '+e.message,true); }
  };
  $('[data-act=setPassword]').addEventListener('click',go);
  $('#fpConfirm').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
  $('#fpNew').focus();
}

/* ============================================================
   DASHBOARD
   ============================================================ */
async function viewDashboard(){
  const g = await loadGraph();
  const scoped = userConId();
  const recent = (await Data.audits()).slice(0,6);
  // filter the working set to scope (a constituency for scoped users; everything for regional)
  const inSet = (e)=>{ if(!scoped) return true; return g.conOf(e)===scoped; };
  const execs = g.execs.filter(inSet);
  const wards = scoped? g.wards.filter(w=>w.constituencyId===scoped) : g.wards;
  const branches = scoped? g.branches.filter(b=>(g.wMap[b.wardId]||{}).constituencyId===scoped) : g.branches;
  const units = scoped? g.units.filter(u=>{const b=g.bMap[u.branchId];return b&&(g.wMap[b.wardId]||{}).constituencyId===scoped;}) : g.units;

  const gd = {male:0,female:0}; execs.forEach(e=>{ gd[e.gender]=(gd[e.gender]||0)+1; });
  const tot = execs.length||1;
  const genderBar = `
    <div class="bar"><i style="width:${gd.male/tot*100}%;background:var(--green)"></i><i style="width:${gd.female/tot*100}%;background:var(--gold)"></i></div>
    <div class="legend"><span><i class="dot" style="background:var(--green)"></i>Male <b>${gd.male||0}</b></span><span><i class="dot" style="background:var(--gold)"></i>Female <b>${gd.female||0}</b></span></div>`;

  const heading = scoped ? ((g.cMap[scoped]||{}).name||'Constituency') : NATION_NAME;
  const fab = `<a class="fab" href="${isNational()?'#/constituencies':('#/constituency/'+(scoped||''))}" title="Open registry">＋ Register</a>`;

  // National roll-up: per-region executive counts
  let regionalBlock='';
  if(!scoped){
    const regExec={}; g.execs.forEach(e=>{ const r=g.regionOf(e); if(r) regExec[r]=(regExec[r]||0)+1; });
    const regions = g.regions.slice().sort((a,b)=>(regExec[b.id]||0)-(regExec[a.id]||0)||a.name.localeCompare(b.name));
    const maxR = Math.max(1, ...regions.map(r=>regExec[r.id]||0));
    const regWithExecs = regions.filter(r=>regExec[r.id]).length;
    regionalBlock = `
    <div class="card pad" style="margin-top:14px">
      <div class="row" style="margin-bottom:10px"><h3 style="font-size:15px">Regions</h3><span class="badge k">${regWithExecs}/${regions.length} active</span></div>
      ${regions.map(r=>`<div class="row small" data-link="#/region/${r.id}" style="cursor:pointer;padding:6px 0;border-bottom:1px solid var(--line);gap:10px">
        <span style="font-weight:600;width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.name)}</span>
        <span class="bar" style="flex:1"><i style="width:${(regExec[r.id]||0)/maxR*100}%;background:var(--green)"></i></span>
        <span class="muted tiny" style="width:28px;text-align:right">${regExec[r.id]||0}</span>
      </div>`).join('')}
    </div>`;
  }

  return `
  <div class="section-head"><h2>${esc(heading)}</h2><span class="spacer"></span><span class="badge k">${esc(State.session.fullName||State.session.username)}</span></div>
  <div class="grid-stat">
    <div class="stat g"><div class="n">${execs.length}</div><div class="l">Executives</div></div>
    <div class="stat k"><div class="n">${scoped?wards.length:g.regions.length}</div><div class="l">${scoped?'Wards':'Regions'}</div></div>
    <div class="stat y"><div class="n">${scoped?branches.length:g.cons.length}</div><div class="l">${scoped?'Branches':'Constituencies'}</div></div>
    <div class="stat r"><div class="n">${scoped?units.length:wards.length}</div><div class="l">${scoped?'Units':'Wards'}</div></div>
  </div>

  <div class="card pad" style="margin-top:14px">
    <div class="row"><h3 style="font-size:15px">Gender distribution</h3></div>
    <div style="margin-top:12px">${execs.length?genderBar:'<p class="muted small" style="margin:6px 0 0">No executives registered yet.</p>'}</div>
  </div>

  ${regionalBlock}

  <div class="card pad" style="margin-top:14px">
    <h3 style="font-size:15px;margin-bottom:12px">Coverage</h3>
    ${covRow('Wards with executives', new Set(execs.filter(e=>e.level==='ward').map(e=>e.wardId)).size, wards.length)}
    ${covRow('Branches with executives', new Set(execs.filter(e=>e.level==='branch').map(e=>e.branchId)).size, branches.length)}
    ${covRow('Units with executives', new Set(execs.filter(e=>e.level==='unit').map(e=>e.unitId)).size, units.length)}
  </div>

  <div class="card pad" style="margin-top:14px">
    <h3 style="font-size:15px;margin-bottom:10px">${isNational()?'Recent activity':'Your recent activity'}</h3>
    ${recent.length? recent.map(a=>`<div class="row small" style="padding:6px 0;border-bottom:1px solid var(--line)"><span class="badge ${a.action==='DELETE'?'r':a.action.startsWith('CREATE')?'':'k'}">${esc(a.action)}</span><span class="muted" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.detail||a.entityType)}</span><span class="tiny muted">${fmtDate(a.ts)}</span></div>`).join('') : '<p class="muted small">No activity yet.</p>'}
  </div>

  ${fab}`;
}
function covRow(label, n, total){
  const pct = total? Math.round(n/total*100):0;
  return `<div style="margin-bottom:12px">
    <div class="row small" style="margin-bottom:5px"><span style="font-weight:600">${label}</span><span class="spacer"></span><span class="muted">${n}/${total} (${pct}%)</span></div>
    <div class="bar"><i style="width:${pct}%;background:${pct>=66?'var(--green)':pct>=33?'var(--gold)':'var(--red)'}"></i></div>
  </div>`;
}

/* ============================================================
   REGISTRY — constituencies, wards, branches, units
   ============================================================ */
// Load the whole org graph once with quick lookup maps + a constituency resolver.
async function loadGraph(){
  const [regions,cons,wards,branches,units,execs]=await Promise.all([Data.regions(),Data.constituencies(),Data.wards(),Data.branches(),Data.units(),Data.execs()]);
  const rMap={},cMap={},wMap={},bMap={},uMap={};
  regions.forEach(r=>rMap[r.id]=r);
  cons.forEach(c=>cMap[c.id]=c); wards.forEach(w=>wMap[w.id]=w); branches.forEach(b=>bMap[b.id]=b); units.forEach(u=>uMap[u.id]=u);
  const conOf=(e)=>{ if(!e) return null;
    if(e.level==='region') return null;
    if(e.level==='constituency') return e.constituencyId;
    if(e.level==='ward') return (wMap[e.wardId]||{}).constituencyId||null;
    if(e.level==='branch'){ const b=bMap[e.branchId]; return b?(wMap[b.wardId]||{}).constituencyId||null:null; }
    const u=uMap[e.unitId]; const b=u?bMap[u.branchId]:null; return b?(wMap[b.wardId]||{}).constituencyId||null:null;
  };
  // region id for a given constituency id, or for a region-level exec via regionId
  const regionOf=(e)=>{ if(!e) return null;
    if(e.level==='region') return e.regionId||null;
    const conId=conOf(e); return conId? (cMap[conId]||{}).regionId||null : null;
  };
  return {regions,cons,wards,branches,units,execs,rMap,cMap,wMap,bMap,uMap,conOf,regionOf};
}

async function buildCrumb(level,node){
  const rootHref = isNational()?'#/constituencies':('#/constituency/'+(userConId()||''));
  const parts=[`<a href="${rootHref}">Registry</a>`];
  const conId = await constituencyIdOf(node);
  if(conId){ const c=await Data.get('con:'+conId); parts.push(`<span class="sep">›</span><a href="#/constituency/${conId}">${esc(c?c.name:conId)}</a>`); }
  if(level==='ward'){ parts.push(`<span class="sep">›</span><span>${esc(node.name)}</span>`); }
  else if(level==='branch'){ const w=await Data.get('ward:'+node.wardId); parts.push(`<span class="sep">›</span><a href="#/ward/${node.wardId}">${esc(w?w.name:'Ward')}</a>`,`<span class="sep">›</span><span>${esc(node.name)}</span>`); }
  else if(level==='unit'){ const b=await Data.get('branch:'+node.branchId); const w=b?await Data.get('ward:'+b.wardId):null; if(w)parts.push(`<span class="sep">›</span><a href="#/ward/${w.id}">${esc(w.name)}</a>`); if(b)parts.push(`<span class="sep">›</span><a href="#/branch/${b.id}">${esc(b.name)}</a>`); parts.push(`<span class="sep">›</span><span>${esc(node.name)}</span>`); }
  return `<div class="crumb">${parts.join('')}</div>`;
}

// groups: [{label, opts:[{v,t}]}]
function groupedSelectField(id,label,groups,val,req){

}

async function saveExec(){

  };
  // parent key depends on level (region has no parent)
  const parentKey = level==='region' ? 'regionId' : (level==='constituency' ? 'constituencyId' : level+'Id');
  rec[parentKey]=fieldVal(parentKey);
  // validation
  let ok=true;
  const required = ['fullName','memberId','position','gender','phone'].concat(parentKey?[parentKey]:[]);
  required.forEach(f=>{ const bad=!rec[f]; setBad(f,bad); if(bad)ok=false; });
  if(rec.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(rec.email)){ setBad('email',true,'Enter a valid email.'); ok=false; }
  if(rec.phone && !/^[0-9+()\-\s]{7,15}$/.test(rec.phone)){ setBad('phone',true,'Enter a valid phone number.'); ok=false; }
  if(rec.dob){ const a=age(rec.dob); if(a==null||a<18||a>120){ setBad('dob',true,'Must be a valid adult date of birth.'); ok=false; } }
  if(!photo){ $('#photoErr').classList.remove('hidden'); ok=false; }
  if(!ok){ toast('Please fix the highlighted fields',true); return; }

  // duplicate detection (phone across active execs, excluding self)
  const all = await Data.execs();
  const dup = all.find(e=> e.id!==id && e.status==='active' && e.phone && e.phone.replace(/\s/g,'')===rec.phone.replace(/\s/g,''));
  if(dup){ const go=await confirmModal('Possible duplicate','An executive ('+dup.fullName+') already uses this phone number. Register anyway?'); if(!go) return; }
  if(rec.dob){ const soft=all.find(e=>e.id!==id && e.dob===rec.dob && e.fullName.toLowerCase().trim()===rec.fullName.toLowerCase().trim()); if(soft){ const go=await confirmModal('Possible duplicate','Someone with the same name and date of birth is already registered. Continue?'); if(!go) return; } }

  const eid = id || uid();
  const existing = id? await Data.get('exec:'+id):null;
  const regNo = (existing && existing.regNo) ? existing.regNo : await nextRegNo(await prefixForExec(rec));
  const final = Object.assign({}, existing||{}, rec, {id:eid, regNo, updatedAt:nowISO(), createdAt:(existing&&existing.createdAt)||nowISO(), createdBy:(existing&&existing.createdBy)||State.session.username});
  await SB.upsert('ndc_executives', execToRow(final));
  await audit(id?'UPDATE':'CREATE','executive',eid, (id?'Updated ':'Registered ')+rec.fullName+' ['+regNo+'] ('+LVS[level]+')');
  toast(id?'Changes saved':'Registered as '+regNo);
  location.hash = '#/exec/'+eid; render();
}

    else if(e.level==='branch') loc=((g.bMap[e.branchId]||{}).name||'')+' (Branch)';
    else loc=((g.uMap[e.unitId]||{}).name||'')+' (Unit)';

    const groups = regions.map(r=>({label:r.name, opts:g.cons.filter(c=>c.regionId===r.id).sort((a,b)=>a.name.localeCompare(b.name)).map(c=>({v:c.id,t:c.name}))}));
    conFilter = `<select id="fcon"><option value="">All constituencies</option>${groups.map(grp=>`<optgroup label="${esc(grp.label)}">${grp.opts.map(o=>`<option value="${esc(o.v)}">${esc(o.t)}</option>`).join('')}</optgroup>`).join('')}</select>`;
  }
  return `
  <div class="section-head"><h2>Search</h2>${scoped?`<span class="sub">${esc((g.cMap[scoped]||{}).name||'')}</span>`:`<span class="sub">${esc(NATION_NAME)}</span>`}</div>

function albumResultItem(e){
  return `<div class="item" data-link="#/exec/${e.id}">
    <div class="av">${e.photo?`<img src="${e.photo}" alt="">`:initials(e.fullName)}</div>
    <div class="body"><div class="nm">${esc(e.fullName)}</div><div class="mt">${e.regNo?`<span class="reg">${esc(e.regNo)}</span> • `:''}${esc(e.position||'—')}${e._con?' • '+esc(e._con):(e._region?' • '+esc(e._region):'')}</div></div>
    <div class="chev">›</div>

function wireSearch(){
  const run=()=>{
    const execs=State._searchCache||[];
    const q=($('#sq').value||'').toLowerCase().trim();
    const lv=$('#flevel').value, gn=$('#fgender').value, sort=$('#fsort').value;
    const regEl=$('#freg'); const reg=regEl?regEl.value:'';
    const conEl=$('#fcon'); const con=conEl?conEl.value:'';
    let out=execs.filter(e=>{
      if(reg&&e._regionId!==reg) return false;
      if(con&&e._conId!==con) return false;
      if(lv&&e.level!==lv) return false;
      if(gn&&e.gender!==gn) return false;
      if(q){ const hay=(e.fullName+' '+e.position+' '+e.phone+' '+(e.email||'')+' '+(e.regNo||'')+' '+(e.memberId||'')).toLowerCase(); if(!hay.includes(q)) return false; }
      return true;
    });
    if(sort==='name') out.sort((a,b)=>a.fullName.localeCompare(b.fullName));
    else if(sort==='position') out.sort((a,b)=>(a.position||'').localeCompare(b.position||''));
    else if(sort==='recent') out.sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));
    else out.sort((a,b)=>String(a.regNo||'').localeCompare(String(b.regNo||'')));
    const box=$('#results');
    box.innerHTML = out.length? `<p class="muted small" style="margin-bottom:8px">${out.length} result(s)</p><div class="list">`+out.map(albumResultItem).join('')+`</div>` : '<div class="empty"><div class="e-ico">🔍</div><h3>No matches</h3><p>Try a different name, position, or filter.</p></div>';
    box.querySelectorAll('[data-link]').forEach(el=>el.onclick=()=>{location.hash=el.dataset.link;render();});
  };
  $('[data-act=runSearch]').onclick=run;
  $('#sq').oninput=run; $('#sq').addEventListener('keydown',e=>{if(e.key==='Enter')run();});
  $('#flevel').onchange=run; $('#fgender').onchange=run; $('#fsort').onchange=run;
  const conEl=$('#fcon'); if(conEl) conEl.onchange=run;
  const regEl=$('#freg'); if(regEl) regEl.onchange=run;
  if($('#sq').value) run();
}

  const wards = scoped? g.wards.filter(w=>w.constituencyId===scoped) : g.wards;

  // enrich each exec with region/constituency, group key, and a location label
  const enriched = execs.map(e=>{
    const cid=g.conOf(e); const con=cid?g.cMap[cid]:null;
    const rid=g.regionOf(e); const reg=rid?g.rMap[rid]:null;
    let groupKey, groupName, loc='';
    if(e.level==='region'){ groupKey='reg:'+rid; groupName=(reg?reg.name:rid)+' (Region)'; loc=(reg?reg.name:'')+' (Region)'; }
    else if(e.level==='constituency'){ groupKey='con:'+cid; groupName=con?con.name+' ('+(reg?reg.code:con.regionId)+')':'—'; loc=(con?con.name:'')+' (Constituency)'; }
    else {
      groupKey='con:'+cid; groupName=con?con.name+' ('+(reg?reg.code:con.regionId)+')':'Unassigned';
      if(e.level==='ward'){ const w=g.wMap[e.wardId]; loc=(w?w.name:'')+' (Ward)'; }
      else if(e.level==='branch'){ const b=g.bMap[e.branchId]; loc=(b?b.name:'—')+' (Branch)'; }
      else { const u=g.uMap[e.unitId]; const b=u?g.bMap[u.branchId]:null; loc=(u?u.name:'—')+(b?' • '+b.name:'')+' (Unit)'; }
    }
    return Object.assign({}, e, {_conId:cid, _con:con?con.name:'', _regionId:rid, _groupKey:groupKey, _groupName:groupName, _loc:loc});
  });
  State._album = {execs:enriched, wards, cons:g.cons, regions:g.regions};

  let regOpts='', conOpts='';

    const regions = g.regions.slice().sort((a,b)=>a.name.localeCompare(b.name));

    conOpts = `<select id="albCon"><option value="">All constituencies</option>${groups.map(grp=>`<optgroup label="${esc(grp.label)}">${grp.opts.map(o=>`<option value="${esc(o.v)}" ${q.con===o.v?'selected':''}>${esc(o.t)}</option>`).join('')}</optgroup>`).join('')}</select>`;
  }
  const levelOpts = `<option value="">All levels</option>`+(scoped?['constituency','ward','branch','unit']:['region','constituency','ward','branch','unit']).map(l=>`<option value="${l}" ${q.level===l?'selected':''}>${LVS[l]}</option>`).join('');
  const scopeName = scoped? ((g.cMap[scoped]||{}).name||'') : NATION_NAME;

  return `
  <div class="album-print-head print-only">

    <div class="pm">${esc(PARTY_MOTTO)}</div>

  <div class="filters no-print">
    ${regOpts}
    ${conOpts}
    <select id="albLevel">${levelOpts}</select>
    <select id="albSort"><option value="reg">Sort: Reg. number</option><option value="name">Sort: Name</option></select>
  </div>

function albumRenderBody(){
  const data = State._album; if(!data) return;
  const regF = $('#albReg') ? $('#albReg').value : '';
  const conF = $('#albCon') ? $('#albCon').value : '';
  const levelF = $('#albLevel') ? $('#albLevel').value : '';
  const sortF = $('#albSort') ? $('#albSort').value : 'reg';
  let list = data.execs.filter(e=>{
    if(regF && e._regionId!==regF) return false;
    if(conF && e._groupKey!==conF) return false;
    if(levelF && e.level!==levelF) return false;
    return true;
  });
  const sorter = sortF==='name'
    ? (a,b)=> (a.fullName||'').localeCompare(b.fullName||'')
    : (a,b)=> String(a.regNo||'').localeCompare(String(b.regNo||''));
  list.sort(sorter);

  // group by region/constituency (national view) / ward (scoped view, via _loc)
  const groups={};
  list.forEach(e=>{ (groups[e._groupName]=groups[e._groupName]||[]).push(e); });
  const groupNames = Object.keys(groups).sort((a,b)=>a==='Unassigned'?1:b==='Unassigned'?-1:a.localeCompare(b));

  const meta = $('#albumPrintMeta');
  if(meta){
    let scope = 'All constituencies';
    if(conF) scope = (data.cons.find(c=>'con:'+c.id===conF)||{}).name||'';
    else if(regF) scope = (data.regions.find(r=>r.id===regF)||{}).name||'';
    meta.textContent = `Executive Photo Album • ${scope}${levelF?' • '+LVS[levelF]:''} • ${list.length} executive(s) • ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})}`;
  }

  const body = $('#albumBody'); if(!body) return;
  if(!list.length){ body.innerHTML = `<div class="empty"><div class="e-ico">📸</div><h3>No photos to show</h3><p>No executives match these filters yet.</p></div>`; return; }

  const card = (e)=>`
    <div class="album-card" data-link="#/exec/${e.id}">
      <div class="album-photo">${e.photo?`<img src="${e.photo}" alt="${esc(e.fullName)}">`:`<span class="ph-init">${initials(e.fullName)}</span>`}</div>
      <div class="album-meta">
        <div class="reg">${esc(e.regNo||'')}</div>
        <div class="nm">${esc(e.fullName)}</div>
        <div class="pos">${esc(e.position||'—')}</div>
        <div class="loc">${esc(e._loc)}</div>
      </div>
    </div>`;

  body.innerHTML = `<div class="small muted no-print" style="margin-bottom:6px">${list.length} executive(s)</div>` +
    groupNames.map(gn=>`
      <div class="album-ward-head">${esc(gn)} <span class="ct">${groups[gn].length}</span></div>
      <div class="album-grid">${groups[gn].map(card).join('')}</div>

const CSV_COLS = ['level','region','constituency','ward','branch','unit','fullName','memberId','position','gender','phone','email','dob','occupation','address','background'];
const EXPORT_COLS = ['regNo'].concat(CSV_COLS);
function csvEscape(v){ v=v==null?'':String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function toCSV(rows, cols=CSV_COLS){ return [cols.join(',')].concat(rows.map(r=>cols.map(c=>csvEscape(r[c])).join(','))).join('\n'); }
function parseCSV(text){
  const rows=[]; let i=0, field='', row=[], q=false;
  while(i<text.length){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=c; }
    else { if(c==='"') q=true; else if(c===','){ row.push(field); field=''; } else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; if(field!==''||row.length){ row.push(field); rows.push(row); row=[]; field=''; } } else field+=c; }
    i++;
  }
  if(field!==''||row.length){ row.push(field); rows.push(row); }
  return rows;
}
function download(name, content, type='text/plain'){ const blob=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000); }

async function exportExecsCSV(){
  const g = await loadGraph();
  const scoped = userConId();
  const execs = g.execs.filter(e=> scoped? g.conOf(e)===scoped : true);
  const wn=id=>{const x=(g.wMap[id]||{});return x.name||'';};
  const bn=id=>{const x=(g.bMap[id]||{});return x.name||'';};
  const un=id=>{const x=(g.uMap[id]||{});return x.name||'';};
  const rn=(rid)=> (g.rMap[rid]||{}).name||'';
  const cn=(e)=>{ const cid=g.conOf(e); if(!cid) return ''; return (g.cMap[cid]||{}).name||''; };
  const rows=execs.map(e=>{
    const rid=g.regionOf(e);
    return {
    regNo:e.regNo||'', level:e.level,
    region: rn(rid),
    constituency: e.level==='constituency'? (g.cMap[e.constituencyId]||{}).name||'' : cn(e),
    ward:e.level==='ward'?wn(e.wardId):(e.level==='branch'?wn((g.bMap[e.branchId]||{}).wardId):(e.level==='unit'?wn((g.bMap[(g.uMap[e.unitId]||{}).branchId]||{}).wardId):'')),
    branch:e.level==='branch'?bn(e.branchId):(e.level==='unit'?bn((g.uMap[e.unitId]||{}).branchId):''),
    unit:e.level==='unit'?un(e.unitId):'',
    fullName:e.fullName, memberId:e.memberId||'', position:e.position, gender:e.gender, phone:e.phone, email:e.email, dob:e.dob, occupation:e.occupation, address:e.address, background:e.background
  };});
  const fname = scoped? `ndc_${((g.cMap[scoped]||{}).code||scoped).toLowerCase()}_executives_${new Date().toISOString().slice(0,10)}.csv` : `ndc_ghana_executives_${new Date().toISOString().slice(0,10)}.csv`;
  download(fname, toCSV(rows, EXPORT_COLS),'text/csv');
  await audit('EXPORT','executive','','Exported '+rows.length+' executives to CSV');
  toast('Exported '+rows.length+' record(s)');
}
async function importCSV(file){
  const text=await file.text(); const rows=parseCSV(text); if(rows.length<2){ toast('File looks empty',true); return; }
  const header=rows[0].map(h=>h.trim()); const idx={}; CSV_COLS.forEach(c=>idx[c]=header.indexOf(c));
  if(idx.fullName<0||idx.level<0){ toast('Missing required columns (level, fullName)',true); return; }
  const g = await loadGraph();
  const scoped = userConId();
  let wards=g.wards.slice(), branches=g.branches.slice(), units=g.units.slice(), cons=g.cons.slice();
  // Resolve a region by name or code.
  const findRegion=(name)=>{
    name=(name||'').trim(); if(!name) return null;
    const found = g.regions.find(r=>r.name.toLowerCase()===name.toLowerCase() || r.code.toLowerCase()===name.toLowerCase());
    return found? found.id : null;
  };
  // Resolve a constituency by name (and region, when given, to disambiguate duplicate names).
  const findCon=(name, regionId)=>{
    name=(name||'').trim();
    if(!name) return scoped||null;
    let matches = cons.filter(c=>c.name.toLowerCase()===name.toLowerCase() || c.code.toLowerCase()===name.toLowerCase());
    if(regionId) matches = matches.filter(c=>c.regionId===regionId).length ? matches.filter(c=>c.regionId===regionId) : matches;
    return matches.length? matches[0].id : (scoped||null);
  };
  const findOrCreate=async (type,name,parentField,parentId,extra)=>{
    name=(name||'').trim(); if(!name) return null;
    let coll = type==='ward'?wards:type==='branch'?branches:units;
    let found = coll.find(x=>x.name.toLowerCase()===name.toLowerCase() && (!parentField || x[parentField]===parentId));
    if(found) return found;
    const rec=Object.assign({id:uid(),name,type,createdAt:nowISO(),updatedAt:nowISO()}, extra||{}); if(parentField) rec[parentField]=parentId;
    if(type==='ward') await SB.upsert('ndc_wards', wardToRow(rec));
    else if(type==='branch') await SB.upsert('ndc_branches', branchToRow(rec));
    else if(type==='unit') await SB.upsert('ndc_units', unitToRow(rec));
    coll.push(rec); return rec;
  };
  let ok=0, fail=0, errs=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r]; if(!row.length||!(row[idx.fullName]||'').trim()) continue;
    const get=(k)=>(idx[k]>=0?(row[idx[k]]||'').trim():'');
    const level=get('level').toLowerCase();
    if(!['region','constituency','ward','branch','unit'].includes(level)){ fail++; errs.push(`Row ${r+1}: invalid level`); continue; }
    if(!get('fullName')||!get('memberId')||!get('position')||!get('gender')||!get('phone')){ fail++; errs.push(`Row ${r+1}: missing required field`); continue; }
    const regionIdHint = findRegion(get('region'));
    if(level==='region'){
      const rid = regionIdHint;
      if(!rid){ fail++; errs.push(`Row ${r+1}: region not found`); continue; }
      const id=uid();
      const rec={id, level, regionId:rid, fullName:get('fullName'), memberId:get('memberId'), position:get('position'), gender:(get('gender').toLowerCase()), phone:get('phone'), email:get('email'), dob:get('dob'), occupation:get('occupation'), address:get('address'), background:get('background'), status:'active', photo:'', createdAt:nowISO(), updatedAt:nowISO(), createdBy:State.session.username};
      rec.regNo = await nextRegNo(await prefixForExec(rec));
      await SB.upsert('ndc_executives', execToRow(rec)); ok++; continue;
    }
    const conId = findCon(get('constituency'), regionIdHint);
    if(!conId){ fail++; errs.push(`Row ${r+1}: constituency not found / not in your scope`); continue; }
    if(!inScope(conId)){ fail++; errs.push(`Row ${r+1}: constituency outside your scope`); continue; }
    let wardId=null,branchId=null,unitId=null;
    if(level==='ward'||level==='branch'||level==='unit'){ const w=await findOrCreate('ward',get('ward'),null,null,{constituencyId:conId}); if(w) wardId=w.id; }
    if(level==='branch'||level==='unit'){ const b=await findOrCreate('branch',get('branch'),'wardId',wardId); if(b) branchId=b.id; }
    if(level==='unit'){ const u=await findOrCreate('unit',get('unit'),'branchId',branchId); if(u) unitId=u.id; }
    if(level==='ward'&&!wardId){ fail++; errs.push(`Row ${r+1}: ward name required`); continue; }
    if(level==='branch'&&!branchId){ fail++; errs.push(`Row ${r+1}: branch name required`); continue; }
    if(level==='unit'&&!unitId){ fail++; errs.push(`Row ${r+1}: unit name required`); continue; }
    const id=uid();
    const rec={id, level, fullName:get('fullName'), memberId:get('memberId'), position:get('position'), gender:(get('gender').toLowerCase()), phone:get('phone'), email:get('email'), dob:get('dob'), occupation:get('occupation'), address:get('address'), background:get('background'), status:'active', photo:'', createdAt:nowISO(), updatedAt:nowISO(), createdBy:State.session.username};
    if(level==='constituency') rec.constituencyId=conId;
    else rec[level+'Id'] = level==='ward'?wardId:level==='branch'?branchId:unitId;
    rec.regNo = await nextRegNo(await prefixForExec(rec));
    await SB.upsert('ndc_executives', execToRow(rec)); ok++;
  }
  await audit('IMPORT','executive','',`Imported ${ok} executives (${fail} failed)`);
  $('#importReport').innerHTML = `<div class="card pad" style="background:var(--green-soft);border:0"><b>${ok} imported</b>${fail?` • <span style="color:var(--red)">${fail} skipped</span>`:''}${errs.length?`<div class="tiny muted" style="margin-top:6px">${errs.slice(0,8).map(esc).join('<br>')}</div>`:''}</div>`;
  toast(`Imported ${ok}, skipped ${fail}`, fail>0);
}
async function fullBackup(){
  try{
    const [users,execs,wards,branches,units,seqs] = await Promise.all([
      SB.select('ndc_users','order=username.asc'),
      SB.select('ndc_executives','order=created_at.asc'),

      SB.select('ndc_branches','order=name.asc'),
      SB.select('ndc_units','order=name.asc'),

    ]);
    const dump={users,execs,wards,branches,units,sequences:seqs};
    download('ndc_ghana_backup_'+new Date().toISOString().slice(0,10)+'.json', JSON.stringify({app:'ndc-ghana',version:'4.0',at:nowISO(),data:dump},null,0),'application/json');
    await audit('BACKUP','system','','Full backup downloaded');
    toast('Backup downloaded');
  }catch(e){ toast('Backup failed: '+e.message,true); }
}
async function restoreBackup(file){
  const go=await confirmModal('Restore backup?','This uploads the backup to Supabase and REPLACES all current shared data for every device immediately. This cannot be undone.');
  if(!go) return;
  try{
    const obj=JSON.parse(await file.text()); const d=obj.data||obj; let n=0;
    if(d.users && d.users.length){ await SB.upsert('ndc_users',d.users); n+=d.users.length; }
    if(d.wards && d.wards.length){ await SB.upsert('ndc_wards',d.wards); n+=d.wards.length; }
    if(d.branches && d.branches.length){ await SB.upsert('ndc_branches',d.branches); n+=d.branches.length; }
    if(d.units && d.units.length){ await SB.upsert('ndc_units',d.units); n+=d.units.length; }
    if(d.execs && d.execs.length){ await SB.upsert('ndc_executives',d.execs); n+=d.execs.length; }
    if(d.sequences && d.sequences.length){ await SB.upsert('ndc_sequences',d.sequences); n+=d.sequences.length; }
    await audit('RESTORE','system','','Restored '+n+' records from backup');
    toast('Restored '+n+' record(s)'); render();
  }catch(e){ toast('Could not restore: '+e.message,true); }
}

  } else {
    const conName = (g.cMap[ownCon]||{}).name||ownCon;
    conField = `<input type="hidden" id="nuCon" value="${esc(ownCon)}"><p class="muted small" style="margin:-4px 0 8px">This account will be created for ${esc(conName)}.</p>`;
    roleOptions = `
      <option value="constituency_admin">Constituency Admin</option>
      <option value="ward_admin">Ward Admin</option>
      <option value="branch_admin">Branch Admin</option>
      <option value="viewer">Viewer</option>`;
  }
  const body=`
    <div class="field"><label>Full name</label><input id="nuName"></div>
    <div class="field"><label>Username</label><input id="nuUser"></div>
    <div class="field"><label>Temporary password</label><input id="nuPw" type="password"></div>
    <p class="muted small" style="margin:-4px 0 8px">The new user will be required to set their own password the first time they sign in.</p>
    <div class="field"><label>Role</label><select id="nuRole">${roleOptions}</select></div>
    ${conField}`;
  const r=await modalForm('Add user',body);
  if(!r.ok) return;
  const name=$('#nuName').value.trim(), username=$('#nuUser').value.trim().toLowerCase(), pw=$('#nuPw').value, role=$('#nuRole').value, conId=$('#nuCon').value;
  if(!username||!pw){ toast('Username and password are required',true); return; }
  const existCheck=await SB.select('ndc_users','username=eq.'+encodeURIComponent(username)+'&limit=1'); if(existCheck&&existCheck.length){ toast('That username is taken',true); return; }
  if(role!=='national_admin' && !conId){ toast('Select a constituency for this user',true); return; }
  if(!national && conId!==ownCon){ toast('You can only create accounts for your own constituency',true); return; }
  r.el.remove();
  const con = conId? await Data.get('con:'+conId) : null;
  const rec={id:username,username,password:pw,fullName:name||username,role,mustChangePassword:true,createdBy:State.session.username};
  if(role!=='national_admin'){ rec.scopeConstituencyId=conId; rec.scopeConstituencyName=con?con.name:conId; }
  await SB.upsert('ndc_users', userToRow(rec));
  await audit('CREATE','user',username,'Added user @'+username+' ('+role+(con?', '+con.name:'')+')');
  toast('User added'); render();
}

/* ============================================================
   ACTIVITY / AUDIT
   ============================================================ */
async function viewAudit(){
  const a=await Data.audits();
  const scopeLabel = isNational()? 'All users' : 'Your activity only';
  return `
  <div class="section-head"><h2>Activity log</h2><span class="sub">${esc(scopeLabel)}</span></div>
  ${a.length? `<div class="list">`+a.slice(0,200).map(x=>`
    <div class="item"><div class="av" style="background:${x.action==='DELETE'?'var(--red-soft)':'var(--green-soft)'};color:${x.action==='DELETE'?'var(--red)':'var(--green)'};font-size:13px">${esc(x.action.slice(0,3))}</div>
      <div class="body"><div class="nm" style="font-size:14px">${esc(x.detail||x.entityType)}</div><div class="mt">@${esc(x.user)} • ${esc(x.action)} • ${esc(x.entityType)}</div></div>
      <div class="tiny muted" style="text-align:right;white-space:nowrap">${new Date(x.ts).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
    </div>`).join('')+`</div>` : emptyState('📋','No activity yet',isNational()?'Actions taken across the registry will be recorded here.':'Actions you take will be recorded here.')}`;
}

/* ============================================================
   Shared UI helpers (empty / modal)
   ============================================================ */
function emptyState(icon,title,msg,actions){ return `<div class="empty"><div class="e-ico">${icon}</div><h3>${esc(title)}</h3><p>${esc(msg)}</p>${actions?`<div style="margin-top:14px">${actions}</div>`:''}</div>`; }
function confirmModal(title,msg){
  return new Promise(res=>{
    const bg=document.createElement('div'); bg.className='modal-bg';
    bg.innerHTML=`<div class="modal"><h3>${esc(title)}</h3><p>${esc(msg)}</p><div class="acts"><button class="btn" data-x="0">Cancel</button><button class="btn danger" data-x="1">Confirm</button></div></div>`;
    document.body.appendChild(bg);
    bg.addEventListener('click',e=>{ if(e.target===bg){ bg.remove(); res(false);} const x=e.target.dataset.x; if(x!==undefined){ bg.remove(); res(x==='1'); } });
  });
}
function modalForm(title,bodyHtml){
  return new Promise(res=>{
    const bg=document.createElement('div'); bg.className='modal-bg';
    bg.innerHTML=`<div class="modal"><h3>${esc(title)}</h3>${bodyHtml}<div class="acts"><button class="btn" data-x="0">Cancel</button><button class="btn primary" data-x="1">Save</button></div></div>`;
    document.body.appendChild(bg);
    bg._resolve=res; bg._cleanup=()=>bg.remove();
    bg.addEventListener('click',e=>{ const x=e.target.dataset.x; if(e.target===bg){bg.remove();res({ok:false});} else if(x!==undefined){ if(x==='0'){bg.remove();res({ok:false});} else { res({ok:true,el:bg}); } } });
  });
}

/* ============================================================
   Org create / edit flows (modal)
   ============================================================ */
async function orgFormModal(type, existing, parentId){
  const g = await loadGraph();
  const wards = (type==='branch') ? g.wards.filter(w=>inScope(w.constituencyId)).sort((a,b)=>a.name.localeCompare(b.name)) : [];
  const branches = (type==='unit') ? g.branches.filter(b=>inScope(g.conOf({level:'branch',branchId:b.id}))).sort((a,b)=>a.name.localeCompare(b.name)) : [];
  let extra='';
  if(type==='ward'){ const conId = parentId || (existing&&existing.constituencyId); const c=g.cMap[conId]; extra=`<div class="field"><label>Constituency</label><input value="${esc(c?c.name:conId||'')}" readonly style="background:var(--green-soft)"></div>`; }
  if(type==='branch'){ extra=`<div class="field"><label>Parent ward <span class="req">*</span></label><select id="of_parent">${wards.map(w=>`<option value="${w.id}" ${parentId===w.id||(existing&&existing.wardId===w.id)?'selected':''}>${esc(w.name)} — ${esc((g.cMap[w.constituencyId]||{}).code||'')}</option>`).join('')}</select></div>`; }
  if(type==='unit'){ extra=`<div class="field"><label>Parent branch <span class="req">*</span></label><select id="of_parent">${branches.map(b=>`<option value="${b.id}" ${parentId===b.id||(existing&&existing.branchId===b.id)?'selected':''}>${esc(b.name)}</option>`).join('')}</select></div>`; }
  const codeLabel = type==='unit'?'Polling station code':'Code (optional)';
  const codeId = type==='unit'?'of_station':'of_code';
  const body=`
    <div class="field"><label>${LV[type]} name <span class="req">*</span></label><input id="of_name" value="${existing?esc(existing.name):''}"></div>
    ${extra}
    <div class="field"><label>${codeLabel}</label><input id="${codeId}" value="${existing?esc(type==='unit'?(existing.stationCode||''):(existing.code||'')):''}"></div>`;
  const r=await modalForm((existing?'Edit ':'Add ')+LVS[type], body);
  if(!r.ok) return;
  const name=$('#of_name').value.trim(); if(!name){ toast('Name is required',true); return; }
  const id = existing? existing.id : uid();
  const rec = Object.assign({}, existing||{}, {id, type, name, updatedAt:nowISO(), createdAt:(existing&&existing.createdAt)||nowISO()});
  if(type==='branch'){ rec.wardId=$('#of_parent').value; rec.code=$('#of_code').value.trim(); }
  if(type==='unit'){ rec.branchId=$('#of_parent').value; rec.stationCode=$('#of_station').value.trim(); }
  if(type==='ward'){ rec.constituencyId = parentId || (existing&&existing.constituencyId); rec.code=$('#of_code').value.trim(); }
  r.el.remove();
  if(type==='ward') await SB.upsert('ndc_wards', wardToRow(rec));
  else if(type==='branch') await SB.upsert('ndc_branches', branchToRow(rec));
  else if(type==='unit') await SB.upsert('ndc_units', unitToRow(rec));
  await audit(existing?'UPDATE':'CREATE',type,id,(existing?'Updated ':'Created ')+LVS[type]+' '+name);
  toast(existing?'Saved':LVS[type]+' added');
  if(!existing && type!=='ward'){ render(); } else { location.hash = '#/'+type+'/'+id; render(); }
}

/* ============================================================
   GLOBAL event wiring
   ============================================================ */
function wireGlobal(){
  document.querySelectorAll('[data-link]').forEach(el=>{ el.style.cursor='pointer'; el.onclick=(e)=>{ if(e.target.closest('[data-act]'))return; location.hash=el.dataset.link; render(); }; });
  document.querySelectorAll('[data-act]').forEach(el=> el.addEventListener('click', onAction));
}
async function onAction(e){
  const el=e.currentTarget; const act=el.dataset.act; e.stopPropagation();
  if(act==='logout') return logout();
  if(act==='account'){ location.hash='#/account'; return render(); }
  if(act==='newWard') return orgFormModal('ward',null,null);
  if(act==='newWardIn') return orgFormModal('ward',null,el.dataset.con);
  if(act==='newChild') return orgFormModal(el.dataset.level,null,el.dataset.parent);
  if(act==='editOrg'){ const n=await Data.get(el.dataset.level+':'+el.dataset.id); return orgFormModal(el.dataset.level,n,null); }
  if(act==='delOrg'){ const go=await confirmModal('Delete '+LVS[el.dataset.level]+'?','This also deletes everything beneath it (branches, units, and their executives).'); if(go){ await cascadeDelete(el.dataset.level,el.dataset.id); toast('Deleted'); history.back(); setTimeout(render,50);} return; }
  if(act==='delExec'){ const go=await confirmModal('Delete executive?','This permanently removes '+el.dataset.name+'.'); if(go){ await SB.delete('ndc_executives','id=eq.'+el.dataset.id); await audit('DELETE','executive',el.dataset.id,'Deleted '+el.dataset.name); toast('Deleted'); history.back(); setTimeout(render,50);} return; }
  if(act==='exportReport') return exportExecsCSV();
}
async function cascadeDelete(type,id){
  if(type==='ward'){
    const branches=(await Data.branches()).filter(b=>b.wardId===id);
    for(const b of branches) await cascadeDelete('branch',b.id);
    await SB.delete('ndc_wards','id=eq.'+id);
  } else if(type==='branch'){
    const units=(await Data.units()).filter(u=>u.branchId===id);
    for(const u of units) await cascadeDelete('unit',u.id);
    await SB.delete('ndc_branches','id=eq.'+id);
  } else {
    await SB.delete('ndc_units','id=eq.'+id);
  }
  await audit('DELETE',type,id,'Deleted '+LVS[type]+' and its records');
}

/* ---------------- Sync indicator ---------------- */
function updateSync(){
  const dot=$('#syncDot'), txt=$('#syncTxt'); if(!dot) return;
  const online = navigator.onLine;
  dot.classList.toggle('online', online);
  txt.textContent = 'Synced';
}
window.addEventListener('online',updateSync); window.addEventListener('offline',updateSync);

/* ---------------- Boot ---------------- */
const ensureReady = (async ()=>{ await bootstrap(); })();
window.addEventListener('hashchange', render);
ensureReady.then(render);

/* ---------------- Service worker ---------------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', async ()=>{
    try{
      const reg = await navigator.serviceWorker.register('sw.js');
      reg.update();
      let updating=false;
      reg.addEventListener('updatefound', ()=>{
        const nw = reg.installing; if(!nw) return;
        nw.addEventListener('statechange', ()=>{
          // A new version finished installing while an old one controls the page → it's an update.
          if(nw.state==='installed' && navigator.serviceWorker.controller){ updating=true; nw.postMessage('skipWaiting'); }
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', ()=>{ if(updating){ updating=false; location.reload(); } });
    }catch(e){}
  });
}
</script>
